name: macro_tracker
description: Offline macro tracking via voice input.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  speech_to_text: ^7.0.0
  flutter_riverpod: ^2.5.1
  table_calendar: ^3.1.2
  fl_chart: ^0.68.0
  shared_preferences: ^2.3.2
  uuid: ^4.4.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: "assets/icon/app_icon_ios.png"
  image_path_ios: "assets/icon/app_icon_ios.png"
  adaptive_icon_background: "#0D1123"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/foods/foods.csv
